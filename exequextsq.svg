<div class="box-content">
<div id="idevice-1776091434673-j67a5ic6p" class="idevice_node text" data-idevice-path="../idevices/text/" data-idevice-type="text" data-idevice-component-type="json" data-idevice-json-data="{&quot;ideviceId&quot;:&quot;idevice-1776091434673-j67a5ic6p&quot;}">
<div class="exe-text-template">
    <p>Como docentes, encontrar una aplicación que motive al alumnado puede ser una tarea compleja, por eso propongo ClassDojo para ello.</p>
<div><br /></div>
<div>Esta herramienta se suele utilizar diariamente por el profesorado para promover un clima de aula positivo. El uso de dicha aplicación puede venirnos bien como docentes sobre todo en el caso de aulas con amplia diversidad.</div>
<div><br /></div>
<div>Clica en el siguiente enlace para conocer recursos de ClassDojo:</div>
<div><br /></div>
<div title=""><a href="https://www.classdojo.com/es-mx/resources/">Recursos para docentes en ClassDojo</a></div>
<div><br />
<div>También puede clicar en este enlace para saber cómo se utiliza:</div>
<div><br /></div>
<div title=""><a href="https://www.educaciontrespuntocero.com/recursos/classdojo-que-es-como-empezar/">ClassDojo, ¿qué es y cómo utilizarla?</a></div>
</div>
</div>
</div>
</div>
