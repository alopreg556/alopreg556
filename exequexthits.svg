<div style="accent-color: #0ba1a1; color: #444444; font-family: 'Atkinson Hyperlegible', Arial, Helvetica, sans-serif; font-size: 16.8px; background-color: #fefefe; text-align: left;"><span style="accent-color: #0ba1a1; font-weight: bolder;">Descripción</span>:&nbsp;Este proyecto de educación emocional, desarrollado a través de eXeLearning, propone al alumnado de 2ºA un conjunto de actividades dinámicas y cooperativas orientadas al reconocimiento, la expresión y la regulación de las emociones. Mediante el trabajo en grupo y el uso de herramientas digitales como Canva o Audacity, el alumnado participa de forma activa en su propio aprendizaje. Las tareas planteadas favorecen el desarrollo de habilidades sociales, la creatividad y la comunicación. De este modo, se impulsa el bienestar emocional y una convivencia positiva en el aula.</div>
